# Código Completo — Escala 4x2 com Sistema de Lembretes

```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Escala 4x2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>

:root{
  --bg:#07111f;
  --card:#0d1b2d;
  --border:rgba(255,255,255,0.08);
  --primary:#00d68f;
  --text:#ffffff;
  --muted:#91a4b7;
  --dia:#84cc16;
  --noite:#3b82f6;
  --folga:#14b8a6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  color:var(--text);

  background:
  radial-gradient(circle at top left,#12335f 0%,transparent 30%),
  radial-gradient(circle at top right,#003f36 0%,transparent 30%),
  linear-gradient(180deg,#020817,#07111f,#081726);
}

.container{
  width:100%;
  max-width:500px;
  margin:auto;
  padding:18px 14px 40px;
}

.header{
  margin-bottom:24px;
}

.logo h1{
  font-size:2rem;
  font-weight:800;
}

.logo span{
  color:var(--primary);
}

.logo p{
  color:var(--muted);
  margin-top:4px;
}

.painel,
.status-card,
.lembrete-box{
  background:rgba(13,27,45,0.92);
  border:1px solid var(--border);
  border-radius:24px;
  padding:18px;
  backdrop-filter:blur(10px);
}

.painel{
  margin-bottom:22px;
}

.label{
  color:var(--muted);
  margin-bottom:12px;
}

.btn-data,
.btn-add{
  width:100%;
  height:56px;
  border:none;
  border-radius:18px;
  color:white;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.btn-data{
  position:relative;
  background:linear-gradient(135deg,#00c896,#0ea5e9);
}

.btn-data input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.data-atual{
  margin-top:16px;
  background:rgba(0,214,143,0.08);
  border:1px solid rgba(0,214,143,0.15);
  padding:16px;
  border-radius:18px;
}

.status-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  margin-bottom:22px;
}

.status-card{
  text-align:center;
}

.status-card h3{
  font-size:2rem;
  margin:10px 0 4px;
}

.status-card p{
  color:var(--muted);
}

.cards{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.card{
  border-radius:28px;
  padding:22px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.noite{
  background:linear-gradient(180deg,#071b38,#0b2245);
}

.dia{
  background:linear-gradient(180deg,#08271d,#0c3a2b);
}

.folga{
  background:linear-gradient(180deg,#072b2a,#0a4341);
}

.topo-card{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.turma{
  font-size:1.6rem;
  font-weight:800;
}

.status{
  color:rgba(255,255,255,0.8);
  margin-top:6px;
}

.tag{
  padding:10px 16px;
  border-radius:14px;
  font-size:0.82rem;
  font-weight:800;
}

.noite .tag{
  background:rgba(59,130,246,0.12);
  color:#7cb5ff;
}

.dia .tag{
  background:rgba(132,204,22,0.12);
  color:#bfff62;
}

.folga .tag{
  background:rgba(20,184,166,0.12);
  color:#67fff1;
}

.funcionarios{
  display:none;
}

.funcionario{
  display:flex;
  justify-content:space-between;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.nome{
  font-weight:600;
}

.local{
  color:var(--muted);
  font-size:0.84rem;
}

.lembretes{
  margin-top:26px;
}

.lembretes h2{
  margin-bottom:14px;
}

.btn-add{
  background:linear-gradient(135deg,#f59e0b,#ef4444);
  margin-bottom:16px;
}

.lembrete-box{
  margin-bottom:14px;
}

.lembrete-hora{
  font-size:1.2rem;
  font-weight:700;
}

.lembrete-texto{
  color:var(--muted);
  margin-top:6px;
}

.excluir{
  margin-top:12px;
  width:100%;
  height:42px;
  border:none;
  border-radius:12px;
  background:#ef4444;
  color:white;
  font-weight:700;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<header class="header">
<div class="logo">
<h1>ESCALA <span>4x2</span></h1>
<p>Gestão de Equipes</p>
</div>
</header>

<section class="painel">

<div class="label">Selecionar data</div>

<label class="btn-data">
<i class="fa-solid fa-calendar-days"></i>
Escolher Data
<input type="date" id="selecionarData">
</label>

<div class="data-atual" id="dataAtual"></div>

</section>

<section class="status-grid">

<div class="status-card">
<i class="fa-regular fa-moon" style="color:#60a5fa"></i>
<h3 id="qtdNoite">0</h3>
<p>Pessoas à Noite</p>
</div>

<div class="status-card">
<i class="fa-solid fa-sun" style="color:#84cc16"></i>
<h3 id="qtdDia">0</h3>
<p>Pessoas de Dia</p>
</div>

</section>

<section class="cards" id="escala"></section>

<section class="lembretes">
<h2>Lembretes</h2>

<button class="btn-add" onclick="criarLembrete()">
<i class="fa-solid fa-bell"></i>
Novo lembrete
</button>

<div id="listaLembretes"></div>
</section>

</div>

<script>

const turmas = [

{
nome:"Turma 669",
inicio:"folga2",
funcionarios:[
{ nome:"Abelardo Correia", local:"R0" },
{ nome:"Alison Jonathan", local:"Baixa Pressão" },
{ nome:"Daciel Martins", local:"Poço de Burro Velho" }
]
},

{
nome:"Turma 668",
inicio:"noite2",
funcionarios:[
{ nome:"Pedro Paulo", local:"Pagitinga" },
{ nome:"Jaelson", local:"Poço 1" }
]
},

{
nome:"Turma 667",
inicio:"dia2",
funcionarios:[
{ nome:"Cremilson Manuel", local:"Vagalume" },
{ nome:"Edgar José", local:"Poço de Burro Velho" }
]
}

];

const sequencia = [
{tipo:"dia",texto:"1º dia trabalhando",badge:"DIA"},
{tipo:"dia",texto:"Último dia trabalhando",badge:"DIA"},
{tipo:"noite",texto:"1ª noite trabalhando",badge:"NOITE"},
{tipo:"noite",texto:"Última noite trabalhando",badge:"NOITE"},
{tipo:"folga",texto:"1º dia de folga",badge:"FOLGA"},
{tipo:"folga",texto:"Último dia de folga",badge:"FOLGA"}
];

const mapaInicio = {
dia1:0,
dia2:1,
noite1:2,
noite2:3,
folga1:4,
folga2:5
};

const inputData = document.getElementById("selecionarData");

const hoje = new Date();

const ano = hoje.getFullYear();
const mes = String(hoje.getMonth()+1).padStart(2,"0");
const dia = String(hoje.getDate()).padStart(2,"0");

inputData.value = `${ano}-${mes}-${dia}`;

function atualizarEscala(){

let totalDia = 0;
let totalNoite = 0;

const dataSelecionada = new Date(inputData.value + "T00:00:00");
const hojeBase = new Date();

hojeBase.setHours(0,0,0,0);

const diferenca = Math.floor(
(dataSelecionada - hojeBase) / (1000 * 60 * 60 * 24)
);

const container = document.getElementById("escala");
container.innerHTML = "";

 document.getElementById("dataAtual").innerHTML =
 dataSelecionada.toLocaleDateString(
 "pt-BR",
 {
 weekday:"long",
 day:"2-digit",
 month:"2-digit",
 year:"numeric"
 }
 );

 turmas.forEach((turma)=>{

 const inicioIndex = mapaInicio[turma.inicio];

 let indexAtual = (inicioIndex + diferenca) % 6;

 if(indexAtual < 0){
 indexAtual += 6;
 }

 const atual = sequencia[indexAtual];

 let funcionariosLista = [...turma.funcionarios];

 if(atual.tipo === "dia"){
 funcionariosLista.push({
 nome:"Luiz Carlos",
 local:"Auxiliar Cabo"
 });

 totalDia += funcionariosLista.length;
 }

 if(atual.tipo === "noite"){
 totalNoite += funcionariosLista.length;
 }

 const card = document.createElement("div");
 card.className = `card ${atual.tipo}`;

 let funcionariosHTML = "";

 funcionariosLista.forEach(funcionario=>{
 funcionariosHTML += `
 <div class="funcionario">
 <div>
 <div class="nome">${funcionario.nome}</div>
 <div class="local">${funcionario.local}</div>
 </div>
 <i class="fa-solid fa-user"></i>
 </div>
 `;
 });

 card.innerHTML = `
 <div class="topo-card">
 <div>
 <div class="turma">${turma.nome}</div>
 <div class="status">${atual.texto}</div>
 </div>
 <div class="tag">${atual.badge}</div>
 </div>

 <div class="funcionarios">
 ${funcionariosHTML}
 </div>
 `;

 card.addEventListener("click",()=>{
 const lista = card.querySelector(".funcionarios");
 lista.style.display = lista.style.display === "block"
 ? "none"
 : "block";
 });

 container.appendChild(card);

 });

 document.getElementById("qtdDia").innerText = totalDia;
 document.getElementById("qtdNoite").innerText = totalNoite;

}

atualizarEscala();

inputData.addEventListener("change", atualizarEscala);

let lembretes = JSON.parse(localStorage.getItem("lembretes")) || [];

function salvarLembretes(){
localStorage.setItem("lembretes", JSON.stringify(lembretes));
}

function renderizarLembretes(){

const lista = document.getElementById("listaLembretes");
lista.innerHTML = "";

lembretes.forEach((lembrete,index)=>{

const div = document.createElement("div");
div.className = "lembrete-box";

 div.innerHTML = `
 <div class="lembrete-hora">${lembrete.hora}</div>
 <div class="lembrete-texto">${lembrete.texto}</div>

 <button class="excluir" onclick="excluirLembrete(${index})">
 Excluir
 </button>
 `;

 lista.appendChild(div);

});

}

function criarLembrete(){

const hora = prompt("Digite a hora do lembrete (Ex: 18:30)");
if(!hora) return;

const texto = prompt("Digite a mensagem do lembrete");
if(!texto) return;

lembretes.push({
hora,
texto,
notificado:false
});

salvarLembretes();
renderizarLembretes();

}

function excluirLembrete(index){
lembretes.splice(index,1);
salvarLembretes();
renderizarLembretes();
}

function tocarSom(){

const audio = new Audio(
"https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
);

audio.play();

}

function verificarLembretes(){

const agora = new Date();

const horaAtual =
String(agora.getHours()).padStart(2,"0") +
":" +
String(agora.getMinutes()).padStart(2,"0");

lembretes.forEach((lembrete)=>{

if(lembrete.hora === horaAtual && !lembrete.notificado){

alert("⏰ " + lembrete.texto);

tocarSom();

lembrete.notificado = true;
salvarLembretes();

}

});

}

setInterval(verificarLembretes,1000);

renderizarLembretes();

</script>

</body>
</html>
```
